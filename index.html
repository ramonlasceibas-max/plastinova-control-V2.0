<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Plastinova Gerencial Pro</title>
  <style>
    :root{
      --bg:#091d3f;
      --panel:#ffffff;
      --line:#bed0ea;
      --text:#142032;
      --muted:#5e6e85;
      --brand:#0a3d78;
      --brand-2:#1459a7;
      --brand-3:#4da3ff;
      --accent:#e3f0ff;
      --success:#1f8f55;
      --warning:#d97706;
      --danger:#c73939;
      --shadow:0 14px 28px rgba(3,17,45,.12);
      --radius:18px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(180deg,#081a38 0%,#0f2f63 24%,#eaf1fb 24.2%,#e7eef8 100%);color:var(--text);overflow-x:hidden;padding-top:env(safe-area-inset-top);}
    .app-shell{max-width:1280px;margin:0 auto;min-height:100vh;display:flex;gap:16px;padding:16px;padding-top:calc(16px + env(safe-area-inset-top));overflow-x:hidden;}
    .side-nav{width:250px;background:linear-gradient(180deg,#071a38,#0d2f61 58%,#1358a5);border-radius:24px;padding:18px;color:#fff;box-shadow:var(--shadow);display:flex;flex-direction:column;position:sticky;top:16px;height:calc(100vh - 32px)}
    .brand{display:flex;gap:12px;align-items:center;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.14)}
    .brand-badge{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#61b8ff,#d9edff);display:flex;align-items:center;justify-content:center;color:#0b3c72;font-weight:900;box-shadow:inset 0 2px 8px rgba(255,255,255,.6)}
    .brand h1{font-size:18px;line-height:1.1;margin:0;font-weight:900;letter-spacing:.4px}
    .brand small{display:block;color:#d5e7ff;font-weight:600;margin-top:2px}
    .nav-list{display:flex;flex-direction:column;gap:10px}
    .nav-btn{width:100%;border:none;border-radius:14px;padding:14px 14px;background:rgba(255,255,255,.08);color:#fff;text-align:left;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:10px;transition:.2s}
    .nav-btn.active,.nav-btn:hover{background:rgba(255,255,255,.18);transform:translateY(-1px)}
    .nav-hint{margin-top:auto;background:rgba(255,255,255,.08);padding:14px;border-radius:16px;font-size:12px;color:#dcecff;line-height:1.4}
    .main{flex:1;min-width:0;display:flex;flex-direction:column;gap:16px}
    .topbar{display:none !important}
    .mobile-tabs{display:none;gap:8px;overflow:auto;padding:10px 4px 4px;border-radius:18px;background:linear-gradient(180deg,#0b2752,#10386f);box-shadow:var(--shadow)}
    .mobile-tab{border:none;background:#fff;color:var(--brand);padding:12px 14px;border-radius:14px;font-weight:800;white-space:nowrap;box-shadow:0 10px 16px rgba(5,22,53,.16)}
    .mobile-tab.active{background:var(--brand);color:#fff}
    .tab-panel{display:none;gap:16px}
    .tab-panel.active{display:grid}
    .grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
    .card{background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);border:1px solid #b9cde7;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;overflow:hidden}
    .card h3{margin:0 0 12px;color:var(--brand);font-size:16px;font-weight:900;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .form-group{flex:1;min-width:180px}
    .form-group label{display:block;font-size:12px;font-weight:800;color:var(--muted);margin-bottom:5px}
    .form-group input,.form-group select{width:100%;padding:12px;border:1px solid #c8d8ea;border-radius:12px;background:#f9fbfe;font-size:14px;color:var(--text)}
    .btn{border:none;border-radius:12px;padding:12px 16px;font-size:14px;font-weight:900;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
    .btn-primary{background:linear-gradient(120deg,#0c3f7b,#1c63b4);color:#fff}
    .btn-secondary{background:linear-gradient(180deg,#f5f9ff,#e9f2ff);color:var(--brand);border:1px solid #cfe1f5}
    .btn-danger{background:linear-gradient(120deg,#bb3838,#d84d4d);color:#fff}
    .btn-success{background:linear-gradient(120deg,#228b58,#2ea568);color:#fff}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px}
    .stat strong{display:block;color:var(--brand);font-size:12px}
    .stat span{display:block;margin-top:6px;font-size:22px;font-weight:900}
    
    /* --- MEJORA: ACORDEÓN PARA EL HISTORIAL --- */
    .historial-accordion{display:flex;flex-direction:column;gap:10px;margin-top:12px}
    .hist-group{border:1px solid #d6e4f5;border-radius:16px;background:#fff;overflow:hidden;box-shadow:0 4px 12px rgba(10,31,68,.05)}
    .hist-group-head{width:100%;border:none;background:linear-gradient(180deg,#ffffff,#f6fbff);padding:14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;text-align:left}
    .hist-date-title{font-weight:900;color:var(--brand);font-size:14px}
    .hist-date-count{font-size:11px;background:var(--accent);padding:4px 10px;border-radius:999px;font-weight:800}
    .hist-group-body{padding:0;border-top:1px solid #edf3fa;display:none;background:#fbfdff}
    .hist-group-body.active{display:block}
    .hist-item-row{display:grid;grid-template-columns:1fr auto;padding:12px 14px;border-bottom:1px solid #eef4fb;align-items:center;gap:10px}
    .hist-item-row:last-child{border-bottom:none}
    .hist-item-info{display:flex;flex-direction:column;gap:3px;min-width:0}
    .hist-item-main{font-weight:800;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hist-item-sub{font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap}
    .hist-item-badge{font-size:9px;font-weight:900;text-transform:uppercase;padding:2px 6px;border-radius:4px;background:#eef6ff;color:var(--brand)}
    .hist-item-price{text-align:right;font-weight:900;color:var(--brand);font-size:14px}
    .hist-delete-btn{padding:8px;background:#fff0f0;color:#d32f2f;border:1px solid #ffdbdb;border-radius:10px;cursor:pointer;font-size:12px}

    /* Tablas de inventario */
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px;background:#fff}
    .db-table th,.db-table td{padding:10px;border-bottom:1px solid #e6edf6;font-size:12px;text-align:left}
    .db-table th{background:linear-gradient(180deg,#0f477f,#165a9d);color:#fff;position:sticky;top:0}
    
    .toast-sync{position:fixed;top:calc(12px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:9999;background:#0d3c77;color:#fff;padding:10px 16px;border-radius:999px;font-weight:900;font-size:13px;opacity:0;transition:0.3s}
    .toast-sync.show{opacity:1}

    @media (max-width: 1024px){
      .app-shell{padding:10px;display:block}
      .side-nav{display:none}
      .mobile-tabs{display:flex}
      .grid-2{grid-template-columns:1fr}
      .stats{grid-template-columns:repeat(2,1fr)}
    }
    @media (max-width: 680px){
      .stats{grid-template-columns:1fr}
      .btn{width:100%}
    }
  </style>
</head>
<body>
  <div id="syncToast" class="toast-sync">Sincronizado</div>
  
  <div class="app-shell">
    <aside class="side-nav">
      <div class="brand">
        <div class="brand-badge">PN</div>
        <div>
          <h1>PLASTINOVA<br>GERENCIAL PRO</h1>
          <small>V3 Operativa</small>
        </div>
      </div>
      <div class="nav-list">
        <button class="nav-btn active" data-tab="registro">📝 Diario</button>
        <button class="nav-btn" data-tab="bd">🗄️ Historial</button>
        <button class="nav-btn" data-tab="dashboard">📊 Gráficas</button>
        <button class="nav-btn" data-tab="cortes">✂️ Cortes</button>
        <button class="nav-btn" data-tab="inventario">📦 Inventario</button>
      </div>
    </aside>

    <main class="main">
      <div class="mobile-tabs">
        <button class="mobile-tab active" data-tab="registro">📝 Diario</button>
        <button class="mobile-tab" data-tab="bd">🗄️ Historial</button>
        <button class="mobile-tab" data-tab="dashboard">📊 Gráficas</button>
        <button class="mobile-tab" data-tab="cortes">✂️ Cortes</button>
        <button class="mobile-tab" data-tab="inventario">📦 Inv.</button>
      </div>

      <section id="tab-registro" class="tab-panel active">
        <div class="grid-2">
          <div class="card">
            <h3>📝 Datos del día</h3>
            <div class="row">
              <div class="form-group"><label>Fecha</label><input type="date" id="fecha"></div>
              <div class="form-group"><label>Semana</label><input type="text" id="semana" readonly></div>
            </div>
            <div class="form-group"><label>Vendedor</label><select id="vendedor"></select></div>
            
            <div style="margin-top:20px">
              <h4>📦 Tinacos / Tambos</h4>
              <div class="row">
                <div class="form-group"><label>Capacidad</label><select id="capTinaco"></select></div>
                <div class="form-group"><label>Color</label><select id="colTinaco"></select></div>
              </div>
              <div class="row">
                <div class="form-group"><label>Operación</label><select id="tipoPrecioTinaco"></select></div>
                <div class="form-group"><label>Cantidad</label><input type="number" id="qTinaco" placeholder="0"></div>
                <div class="form-group"><label>Precio Uni.</label><input type="number" id="pTinaco" placeholder="0.00"></div>
              </div>
              <button class="btn btn-primary btn-block" id="btnAgregarTinaco">➕ Agregar a revisión</button>
            </div>
          </div>

          <div class="card">
            <h3>📋 Revisión y Guardado</h3>
            <div id="listaPendientes" style="margin-bottom:15px"></div>
            <button class="btn btn-success btn-block" id="btnGuardarRegistro">💾 Guardar todo el historial</button>
            <button class="btn btn-secondary btn-block" id="btnLimpiarPendientes" style="margin-top:8px">🧹 Limpiar lista</button>
          </div>
        </div>
      </section>

      <section id="tab-bd" class="tab-panel">
        <div class="card">
          <h3>🗄️ Historial de Movimientos</h3>
          <div class="row">
            <div class="form-group"><label>Filtrar Vendedor</label><select id="historialFiltroVendedor"></select></div>
            <button class="btn btn-secondary" id="btnLimpiarFiltroHistorial">↺ Todos</button>
          </div>
          <div id="historialAccordion" class="historial-accordion"></div>
          <div class="row" style="margin-top:20px">
            <button class="btn btn-danger btn-block" id="btnBorrarTodoHistorial">🗑️ Borrar todo el historial</button>
          </div>
        </div>
      </section>

      <section id="tab-dashboard" class="tab-panel">
        <div class="stats">
          <div class="stat"><strong>Ventas</strong><span id="dashVentasTotal">$0.00</span></div>
          <div class="stat"><strong>Producción</strong><span id="dashProdTotal">0</span></div>
        </div>
        <div class="card">
          <h3>📊 Resumen</h3>
          <div id="graficaVentas" style="height:200px"></div>
        </div>
      </section>

      <section id="tab-cortes" class="tab-panel">
        <div class="card">
          <h3>✂️ Corte de Caja</h3>
          <div class="form-group"><label>Vendedor</label><select id="vendedorCorte"></select></div>
          <div class="row">
            <div class="form-group"><label>Desde</label><input type="date" id="fechaDesde"></div>
            <div class="form-group"><label>Hasta</label><input type="date" id="fechaHasta"></div>
          </div>
          <button class="btn btn-warning btn-block" id="btnGenerarCorte">📄 Generar PDF de Corte</button>
        </div>
      </section>

      <section id="tab-inventario" class="tab-panel">
        <div class="card">
          <h3>📦 Stock en Bodega</h3>
          <div class="table-wrap">
            <table class="db-table" id="tablaStockActual">
              <thead><tr><th>Material</th><th>Stock</th><th>Acción</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script>
    // --- CONFIGURACIÓN Y DATOS ---
    const STORAGE_KEYS = { MOVS: 'plastinova_movs_v3', STOCK: 'plastinova_stock_v3' };
    const VENDEDORES = ['FERNANDO','HUSAI','ISIDRO','IVAN','OFELIA','PEDRO','RAMON'];
    const CAPS_TIN = ['1200LT','1100LT','750LT'];
    const COLS_TIN = ['BEIGE','NEGRO','AZUL','ROJO','VERDE','NATURAL','NARANJA','CAFÉ','BLANCO','VERDE INDUSTRIAL'];

    let state = {
      movements: JSON.parse(localStorage.getItem(STORAGE_KEYS.MOVS)) || [],
      stock: {},
      pending: [],
      activeTab: 'registro',
      openDateGroup: null // Control de acordeón
    };

    // --- UTILIDADES ---
    const $ = id => document.getElementById(id);
    const hoyLocalISO = () => {
      const d = new Date();
      return new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().split('T')[0];
    };
    const getNumeroSemana = dStr => {
      const d = new Date(dStr + "T12:00:00");
      const start = new Date(d.getFullYear(), 0, 1);
      return Math.ceil((((d - start) / 86400000) + 1) / 7);
    };
    const formatMoney = n => parseFloat(n).toLocaleString('es-MX', {style:'currency', currency:'MXN'});

    // --- LÓGICA DE NAVEGACIÓN (OPTIMIZADA PARA IPHONE) ---
    function switchTab(tabId) {
      if (state.activeTab === tabId) return;
      
      // 1. Quitar clases activas
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn, .mobile-tab').forEach(b => b.classList.remove('active'));

      // 2. Activar nueva pestaña
      $(`tab-${tabId}`).classList.add('active');
      document.querySelectorAll(`[data-tab="${tabId}"]`).forEach(b => b.classList.add('active'));
      
      state.activeTab = tabId;

      // 3. Renderizar contenido específico de la pestaña solo al entrar
      if (tabId === 'bd') renderHistory();
      if (tabId === 'dashboard') renderDashboard();
      if (tabId === 'inventario') updateStockUI();
      
      // Forzar scroll arriba para evitar saltos en iOS
      window.scrollTo(0,0);
    }

    // --- MEJORA: RENDERIZADO DE HISTORIAL TIPO ABANICO ---
    function renderHistory() {
      const container = $('historialAccordion');
      container.innerHTML = '';
      
      const filterVend = $('historialFiltroVendedor').value;
      let filtered = state.movements;
      if (filterVend !== 'TODOS') filtered = filtered.filter(m => m.vendedor === filterVend);

      // Agrupar por fecha
      const groups = {};
      filtered.sort((a,b) => b.fecha.localeCompare(a.fecha)).forEach(m => {
        if (!groups[m.fecha]) groups[m.fecha] = [];
        groups[m.fecha].push(m);
      });

      if (Object.keys(groups).length === 0) {
        container.innerHTML = '<div class="subtle" style="text-align:center;padding:20px">No hay registros aún.</div>';
        return;
      }

      Object.keys(groups).forEach(fecha => {
        const movs = groups[fecha];
        const groupEl = document.createElement('div');
        groupEl.className = 'hist-group';
        
        const isOpen = state.openDateGroup === fecha;

        groupEl.innerHTML = `
          <button class="hist-group-head" onclick="toggleHistoryGroup('${fecha}')">
            <span class="hist-date-title">${fecha.split('-').reverse().join('/')}</span>
            <span class="hist-date-count">${movs.length} movs.</span>
          </button>
          <div class="hist-group-body ${isOpen ? 'active' : ''}" id="body-${fecha}">
            ${movs.map(m => `
              <div class="hist-item-row">
                <div class="hist-item-info">
                  <div class="hist-item-main">${m.concepto}</div>
                  <div class="hist-item-sub">
                    <span class="hist-item-badge">${m.vendedor}</span>
                    <span>Cant: ${m.cantidad}</span>
                  </div>
                </div>
                <div style="display:flex;align-items:center;gap:12px">
                  <div class="hist-item-price">${m.total > 0 ? formatMoney(m.total) : '-'}</div>
                  <button class="hist-delete-btn" onclick="deleteMov('${m.id}')">❌</button>
                </div>
              </div>
            `).join('')}
          </div>
        `;
        container.appendChild(groupEl);
      });
    }

    window.toggleHistoryGroup = (fecha) => {
      state.openDateGroup = state.openDateGroup === fecha ? null : fecha;
      renderHistory();
    };

    // --- RECONSTRUCCIÓN DE STOCK ---
    function rebuildStock() {
      let s = {};
      state.movements.forEach(m => {
        const mat = m.colorUI || m.concepto;
        if (!mat) return;
        s[mat] = (s[mat] || 0);
        if (m.tipo.includes('VENTA')) s[mat] -= parseFloat(m.cantidad);
        if (m.tipo.includes('PROD') || m.tipo.includes('COMPRA')) s[mat] += parseFloat(m.cantidad);
        if (m.tipo === 'INVENTARIO_FISICO') s[mat] = parseFloat(m.cantidad);
      });
      state.stock = s;
      updateStockUI();
    }

    function updateStockUI() {
      const tbody = $('tablaStockActual').querySelector('tbody');
      tbody.innerHTML = '';
      Object.keys(state.stock).sort().forEach(m => {
        tbody.innerHTML += `<tr><td>${m}</td><td><b>${state.stock[m]}</b></td><td><button onclick="ajusteManual('${m}')">✏️</button></td></tr>`;
      });
    }

    // --- ACCIONES ---
    function addPending() {
      const v = $('vendedor').value;
      const f = $('fecha').value;
      const cap = $('capTinaco').value;
      const col = $('colTinaco').value;
      const q = parseFloat($('qTinaco').value) || 0;
      const p = parseFloat($('pTinaco').value) || 0;

      if (q <= 0) return alert("Ingresa cantidad");

      state.pending.push({
        id: Date.now() + Math.random().toString(36).substr(2, 5),
        fecha: f,
        vendedor: v,
        tipo: 'VENTA_TINACO',
        concepto: `TINACO ${cap} ${col}`,
        cantidad: q,
        precio: p,
        total: q * p,
        colorUI: `TINACO ${cap} ${col}`
      });
      renderPending();
      $('qTinaco').value = '';
    }

    function renderPending() {
      const container = $('listaPendientes');
      container.innerHTML = state.pending.map(p => `
        <div style="background:#f0f7ff;padding:10px;border-radius:10px;margin-bottom:5px;font-size:12px;display:flex;justify-content:space-between">
          <div><b>${p.concepto}</b><br>${p.cantidad} pzas - ${formatMoney(p.total)}</div>
          <button onclick="state.pending=state.pending.filter(x=>x.id!=='${p.id}');renderPending();">❌</button>
        </div>
      `).join('');
    }

    function saveAll() {
      if (state.pending.length === 0) return alert("No hay nada que guardar");
      state.movements = [...state.movements, ...state.pending];
      state.pending = [];
      localStorage.setItem(STORAGE_KEYS.MOVS, JSON.stringify(state.movements));
      rebuildStock();
      renderPending();
      alert("Guardado con éxito");
    }

    function deleteMov(id) {
      if (!confirm("¿Borrar registro?")) return;
      state.movements = state.movements.filter(m => m.id !== id);
      localStorage.setItem(STORAGE_KEYS.MOVS, JSON.stringify(state.movements));
      rebuildStock();
      renderHistory();
    }

    function renderDashboard() {
        let ventas = 0;
        let prod = 0;
        state.movements.forEach(m => {
            if(m.tipo.includes('VENTA')) ventas += m.total;
            if(m.tipo.includes('PROD')) prod += m.cantidad;
        });
        $('dashVentasTotal').innerText = formatMoney(ventas);
        $('dashProdTotal').innerText = prod;
    }

    // --- INICIALIZACIÓN ---
    function init() {
      // Poblar selectores
      const selV = $('vendedor');
      const selVC = $('vendedorCorte');
      const selVF = $('historialFiltroVendedor');
      VENDEDORES.forEach(v => {
        selV.add(new Option(v, v));
        selVC.add(new Option(v, v));
        selVF.add(new Option(v, v));
      });
      selVF.add(new Option("TODOS", "TODOS"), 0);
      selVF.value = "TODOS";

      const selCap = $('capTinaco');
      CAPS_TIN.forEach(c => selCap.add(new Option(c, c)));
      
      const selCol = $('colTinaco');
      COLS_TIN.forEach(c => selCol.add(new Option(c, c)));

      $('fecha').value = hoyLocalISO();
      $('semana').value = getNumeroSemana($('fecha').value);

      // Eventos de botones
      document.querySelectorAll('[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
      });

      $('btnAgregarTinaco').onclick = addPending;
      $('btnGuardarRegistro').onclick = saveAll;
      $('btnLimpiarPendientes').onclick = () => { state.pending = []; renderPending(); };
      $('btnLimpiarFiltroHistorial').onclick = () => { $('historialFiltroVendedor').value = 'TODOS'; renderHistory(); };

      rebuildStock();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
